controllers:
    resource:
        path: ../src/Controller/
        namespace: App\Controller
    type: attribute

app_logout:
    path: /{_locale}/logout
    methods: GET

change_locale:
    path: /change-locale/{locale}
    controller: App\Controller\LocalController::change
    requirements:
        _locale: en|es

index:
    path: /
    controller: App\Controller\HomeController::index
    requirements:
        _locale: en|es
